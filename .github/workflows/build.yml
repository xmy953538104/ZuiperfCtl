name: Build ZuiperfCtl

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "payload/**"
      - "scripts/**"
      - ".github/workflows/build.yml"
      - "*.gradle.kts"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Check scripts
        run: |
          python3 -m py_compile scripts/ApplyZuiperfCtlPayload.py
          bash -n payload/system/bin/zui_perfctld
          bash -n payload/system/etc/zui_perfctl/zui_asoulopt.sh

      - name: Decode release keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE }}" | base64 -d > "$RUNNER_TEMP/zuiperfctl-release.jks"

      - name: Build release APK
        run: |
          gradle -p . :app:assembleRelease \
            -Pzuiperf.storeFile="$RUNNER_TEMP/zuiperfctl-release.jks" \
            -Pzuiperf.storePassword="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pzuiperf.keyAlias="${{ secrets.KEY_ALIAS }}" \
            -Pzuiperf.keyPassword="${{ secrets.KEY_PASSWORD }}"

      - name: Stage payload APK
        run: |
          mkdir -p payload/system/priv-app/ZuiperfCtl
          cp app/build/outputs/apk/release/app-release.apk \
            payload/system/priv-app/ZuiperfCtl/ZuiperfCtl.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZuiperfCtl-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload payload
        uses: actions/upload-artifact@v4
        with:
          name: zui-perfctl-v12-payload
          path: payload
