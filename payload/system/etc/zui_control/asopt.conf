# A-SOUL Games Optimization default config
# Reference copy for the system-built AsoulOpt integration.
# The patched binary reads /system/etc/asopt.conf.

# Operation mode:
# 0 = affinity
# 1 = soft migrate
# 2 = hard migrate
mode=2

# Real-time mode:
# 0 = scheduler default
# 1 = may improve stability, but can cause freezes on some kernels
rt=0

# Scheduler optimization argument.
# Upstream default:
opt=0xDEADBEEF
